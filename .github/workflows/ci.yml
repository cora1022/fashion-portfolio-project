name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm run test
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - run: uv run ruff check backend
      - run: uv run pytest backend/tests -q

  container-and-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose --env-file .env.example config
      - run: docker build -f frontend/Dockerfile .
      - run: docker build -f backend/Dockerfile .
      - run: test ! -f .env
      - name: Ensure secrets and local data are not tracked
        run: |
          ! git ls-files | grep -E '(^|/)\.env$|(^|/)(qdrant_storage|catalog/images)/'
