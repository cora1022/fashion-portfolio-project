services:
  caddy:
    image: caddy:2.10.2-alpine
    ports: ["80:80"]
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-http://localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend: { condition: service_healthy }
      backend: { condition: service_healthy }
      member-service: { condition: service_healthy }
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    expose: ["8080"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose: ["8000"]
    environment:
      QDRANT_URL: http://qdrant:6333
      YOLO_CLOTHING_MODEL_PATH: ${YOLO_CLOTHING_MODEL_PATH:-backend/models/yolov8n-clothing-detection-best.pt}
      HF_HOME: /app/.cache/huggingface
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      MAX_IMAGE_PIXELS: ${MAX_IMAGE_PIXELS:-16000000}
      INFERENCE_MAX_CONCURRENCY: ${INFERENCE_MAX_CONCURRENCY:-1}
      INFERENCE_QUEUE_TIMEOUT_SECONDS: ${INFERENCE_QUEUE_TIMEOUT_SECONDS:-5}
      SEARCH_TIMEOUT_SECONDS: ${SEARCH_TIMEOUT_SECONDS:-45}
      CATALOG_MANIFEST_PATH: /app/catalog/manifest.json
      CATALOG_IMAGES_DIR: /app/catalog/images
      JWT_PUBLIC_KEY_PATH: /run/jwt-public/public.pem
      JWT_ISSUER: ${JWT_ISSUER:-style-finder-member-service}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-style-finder-api}
    volumes:
      - hf_cache:/app/.cache/huggingface
      - ./catalog:/app/catalog:ro
      - jwt_public:/run/jwt-public:ro
    depends_on:
      qdrant: { condition: service_healthy }
      jwt-keygen: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')\""]
      interval: 15s
      timeout: 5s
      retries: 5
    cpus: ${BACKEND_CPUS:-2}
    mem_limit: ${BACKEND_MEMORY:-4g}
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.18.1
    expose: ["6333", "6334"]
    volumes: ["qdrant_storage:/qdrant/storage"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 3s
      retries: 10
    cpus: ${QDRANT_CPUS:-1}
    mem_limit: ${QDRANT_MEMORY:-1g}
    restart: unless-stopped

  member-service:
    build:
      context: .
      dockerfile: member-service/Dockerfile
    expose: ["8080"]
    environment:
      MEMBER_DB_URL: jdbc:mysql://mysql:3306/stylefinder_member?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      MYSQL_USER: ${MYSQL_USER:-stylefinder}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      JWT_PRIVATE_KEY_PATH: /run/jwt-private/private.pem
      JWT_PUBLIC_KEY_PATH: /run/jwt-public/public.pem
      JWT_ISSUER: ${JWT_ISSUER:-style-finder-member-service}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-style-finder-api}
      MEMBER_CORS_ORIGINS: ${MEMBER_CORS_ORIGINS:-http://localhost,http://localhost:5173}
    volumes:
      - jwt_private:/run/jwt-private:ro
      - jwt_public:/run/jwt-public:ro
    depends_on:
      mysql: { condition: service_healthy }
      jwt-keygen: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: stylefinder_member
      MYSQL_USER: ${MYSQL_USER:-stylefinder}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-root-password}
    volumes: ["mysql_data:/var/lib/mysql"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  jwt-keygen:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - /app/.venv/bin/python
      - -m
      - backend.app.security.keygen
      - --private-key
      - /run/jwt-private/private.pem
      - --public-key
      - /run/jwt-public/public.pem
    volumes:
      - jwt_private:/run/jwt-private
      - jwt_public:/run/jwt-public
    restart: "no"

volumes:
  caddy_data:
  caddy_config:
  hf_cache:
  qdrant_storage:
  mysql_data:
  jwt_private:
  jwt_public:
