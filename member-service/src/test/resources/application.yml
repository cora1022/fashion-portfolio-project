spring:
  datasource:
    url: jdbc:h2:mem:member;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
app:
  security:
    private-key-path: overridden-by-test
    public-key-path: overridden-by-test
    issuer: test-member-service
    audience: test-style-finder-api
    access-token-seconds: 900
    refresh-token-seconds: 3600
  cors-origins: http://localhost:5173
