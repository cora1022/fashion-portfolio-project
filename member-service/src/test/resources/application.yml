spring:
  datasource:
    url: jdbc:h2:mem:member;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
app:
  security:
    jwt-secret: test-secret-that-is-at-least-thirty-two-bytes-long
    access-token-seconds: 900
    refresh-token-seconds: 3600
  cors-origins: http://localhost:5173
